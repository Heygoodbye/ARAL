<svg viewBox="0 0 620 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Luxury chrome gradients -->
    <linearGradient id="chrome-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#FFFFFF" />
      <stop offset="30%" stopColor="#D8DBDF" />
      <stop offset="50%" stopColor="#8A929A" />
      <stop offset="55%" stopColor="#2A2F35" />
      <stop offset="70%" stopColor="#111518" />
      <stop offset="85%" stopColor="#5B626A" />
      <stop offset="100%" stopColor="#FAFAFA" />
    </linearGradient>

    <linearGradient id="chrome-grad-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#5B626A" />
      <stop offset="50%" stopColor="#1F2326" />
      <stop offset="100%" stopColor="#0B0D0E" />
    </linearGradient>

    <linearGradient id="chrome-stroke-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#FFFFFF" />
      <stop offset="50%" stopColor="#8A929A" />
      <stop offset="100%" stopColor="#1F2326" />
    </linearGradient>

    <linearGradient id="tile-grad-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#E5E7EB" />
      <stop offset="50%" stopColor="#9CA3AF" />
      <stop offset="100%" stopColor="#1F2937" />
    </linearGradient>

    <linearGradient id="tile-grad-2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#D1D5DB" />
      <stop offset="50%" stopColor="#4B5563" />
      <stop offset="100%" stopColor="#111827" />
    </linearGradient>
  </defs>

  <!-- Group for the Diamond Logo (offset left) -->
  <g transform="translate(10, 0)">
    <!-- Right Top Facet -->
    <polygon points="120,20 175,20 230,80 120,80" fill="url(#chrome-grad)" />
    <line x1="120" y1="20" x2="120" y2="80" stroke="#FFFFFF" strokeWidth="1" opacity="0.4" />
    <line x1="175" y1="20" x2="120" y2="80" stroke="#111" strokeWidth="1" opacity="0.3" />

    <!-- Bottom Right Facets -->
    <polygon points="120,80 230,80 120,185" fill="url(#chrome-grad)" />
    <polygon points="120,80 175,130 120,185" fill="url(#chrome-grad-dark)" opacity="0.85" />

    <!-- Bottom Left Facets -->
    <polygon points="10,80 120,80 120,185" fill="url(#chrome-grad)" />
    <polygon points="65,130 120,80 120,185" fill="url(#chrome-grad-dark)" opacity="0.95" />

    <!-- Fine chrome lines -->
    <line x1="120" y1="185" x2="120" y2="80" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />
    <line x1="10" y1="80" x2="120" y2="80" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />
    <line x1="120" y1="80" x2="230" y2="80" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />
    <line x1="120" y1="185" x2="10" y2="80" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />
    <line x1="120" y1="185" x2="230" y2="80" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />

    <!-- Left Top Mosaic Facet -->
    <g>
      <polygon points="120,20 65,20 10,80 120,80" fill="#111827" />
      <!-- Row 1 -->
      <polygon points="101,20 120,20 120,40 101,40" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <polygon points="83,20 101,20 101,40 83,40" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
      <polygon points="65,20 83,20 83,40 65,40" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <!-- Row 2 -->
      <polygon points="101,40 120,40 120,60 101,60" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
      <polygon points="83,40 101,40 101,60 83,60" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <polygon points="65,40 83,40 83,60 65,60" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
      <polygon points="47,40 65,40 65,60 47,60" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <!-- Row 3 -->
      <polygon points="101,60 120,60 120,80 101,80" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <polygon points="83,60 101,60 101,80 83,80" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
      <polygon points="65,60 83,60 83,80 65,80" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <polygon points="47,60 65,60 65,80 47,80" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
      <polygon points="29,60 47,60 47,80 29,80" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <!-- Fillers -->
      <polygon points="65,20 47,40 65,40" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
      <polygon points="47,40 29,60 47,60" fill="url(#tile-grad-1)" stroke="#111827" strokeWidth="1" />
      <polygon points="29,60 10,80 29,80" fill="url(#tile-grad-2)" stroke="#111827" strokeWidth="1" />
    </g>

    <polygon points="120,20 65,20 10,80 120,80" fill="none" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />
    <polygon points="120,20 175,20 230,80 120,80" fill="none" stroke="url(#chrome-stroke-grad)" strokeWidth="1.5" />

    <!-- Center shining star -->
    <circle cx="120" cy="80" r="3.5" fill="#FFFFFF" />
    <path d="M 120,66 L 120,94 M 106,80 L 134,80" stroke="#FFFFFF" strokeWidth="1.5" opacity="0.8" />
  </g>

  <!-- Typography Left-Aligned relative to the right column -->
  <!-- Line 1: Farsi Calligraphy "رایموت" -->
  <text 
    x="265" 
    y="70" 
    font-family="system-ui, -apple-system, 'Vazirmatn', 'Vazir', 'Tahoma', 'Arial', sans-serif" 
    font-size="64" 
    font-weight="950" 
    fill="#FFFFFF" 
    letter-spacing="-0.02em"
  >رایموت</text>

  <!-- Line 2: RAIMOSET -->
  <text 
    x="265" 
    y="126" 
    font-family="'Space Grotesk', 'Inter', -apple-system, system-ui, sans-serif" 
    font-size="38" 
    font-weight="800" 
    fill="#FFFFFF" 
    letter-spacing="0.1em"
  >RAIMOSET</text>

  <!-- Line 3: CERAMIC -->
  <text 
    x="267" 
    y="166" 
    font-family="'Inter', -apple-system, system-ui, sans-serif" 
    font-size="19" 
    font-weight="600" 
    fill="#CCCCCC" 
    letter-spacing="0.44em"
  >CERAMIC</text>
</svg>
